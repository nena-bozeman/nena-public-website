# Devcontainer / local CMS: Decap local backend (decap-server on port 8081).
# Applied automatically by .devcontainer/start.sh via `npm run cms:use-dev-config`.
# Keep collections/media paths in sync with config.yml when you change the CMS schema.

local_backend: true
backend:
  name: github
  repo: nena-bozeman/nena-public-website
  branch: main
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

x-topics-field: &topics_field
  label: "Topics"
  name: "topics"
  widget: "select"
  multiple: true
  required: false
  hint: "Curated themes for cross-linking (objectives, related news/events)."
  options:
    - { label: "NENA Newsletters", value: "newsletter" }
    - { label: "NENA Meetings", value: "meeting" }
    - { label: "Bozeman UDC", value: "bozeman-udc" }
    - { label: "Affordable Housing", value: "affordable-housing" }
    - { label: "Parade of Sheds", value: "parade-of-sheds" }
    - { label: "VisionNE", value: "visionne" }
    - { label: "NENA Trees", value: "trees" }
    - { label: "Trails & Parks", value: "trails-pocket-parks" }
    - { label: "Traffic Calming", value: "traffic-calming" }
    - { label: "NENA Survey", value: "nena-survey" }
    - { label: "Safe & Quiet Rail Crossings", value: "safe-quiet-rail-crossings" }
    - { label: "Environment", value: "environment" }
    - { label: "Volunteer", value: "volunteer" }
    - { label: "Community", value: "community" }
    - { label: "Historic Preservation", value: "historic-preservation" }
    - { label: "Parking", value: "parking" }

x-tags-field: &tags_field
  label: "Tags"
  name: "tags"
  widget: "list"
  required: false
  hint: "Freeform labels for display and search only — do not power objective linking."

collections:
  - name: "news"
    label: "News"
    folder: "src/content/news"
    create: true
    summary: "{{title}}  ·  {{date | date('YYYY-MM-DD')}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Record created (optional)", name: "dateCreated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Record updated (optional)", name: "dateUpdated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Draft (hidden in production)", name: "draft", widget: "boolean", default: false }
      - <<: *topics_field
      - <<: *tags_field
      - label: "Development projects"
        name: "developments"
        widget: "relation"
        collection: "development"
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title", "phase"]
        multiple: true
        required: false
      - label: "Places mentioned"
        name: "places"
        widget: "relation"
        collection: "places"
        search_fields: ["name"]
        value_field: "{{slug}}"
        display_fields: ["name", "placeType"]
        multiple: true
        required: false
      - label: "Related meetings"
        name: "meetings"
        widget: "relation"
        collection: "meetings"
        search_fields: ["title", "meetingDate"]
        value_field: "{{slug}}"
        display_fields: ["title", "meetingDate"]
        multiple: true
        required: false
      - label: "Related events"
        name: "events"
        widget: "relation"
        collection: "events"
        search_fields: ["title", "startDate"]
        value_field: "{{slug}}"
        display_fields: ["title", "startDate"]
        multiple: true
        required: false
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "events"
    label: "Events"
    folder: "src/content/events"
    create: true
    summary: "{{title}}  ·  {{startDate | date('YYYY-MM-DD')}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Start Date", name: "startDate", widget: "datetime" }
      - { label: "End Date", name: "endDate", widget: "datetime", required: false }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Category", name: "category", widget: "select", options: ["social","civic","committee","tour","other"] }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Record created (optional)", name: "dateCreated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Record updated (optional)", name: "dateUpdated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - <<: *topics_field
      - <<: *tags_field
      - label: "Related meeting"
        name: "meetingSlug"
        widget: "relation"
        collection: "meetings"
        search_fields: ["title", "meetingDate"]
        value_field: "{{slug}}"
        display_fields: ["title", "meetingDate"]
        required: false
      - label: "Related news"
        name: "newsSlugs"
        widget: "relation"
        collection: "news"
        search_fields: ["title", "date"]
        value_field: "{{slug}}"
        display_fields: ["title", "date"]
        multiple: true
        required: false
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "places"
    label: "Places"
    folder: "src/content/places"
    create: true
    identifier_field: name
    summary: "{{name}}  ·  {{placeType}}  ·  {{commit_date | date('YYYY-MM-DD')}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Place type", name: "placeType", widget: "select", options: ["business", "park", "landmark"], default: "business" }
      - { label: "Categories", name: "categories", widget: "select", multiple: true, options: ["food-drink","retail","services","arts-culture","fitness-wellness","nonprofit","other","trails-pocket-parks"], hint: "Required for businesses; parks and landmarks often use Trails & Parks." }
      - { label: "Address", name: "address", widget: "string" }
      - { label: "Website", name: "website", widget: "string", required: false }
      - label: "History article"
        name: "historySlug"
        widget: "relation"
        collection: "history"
        search_fields: ["title", "year"]
        value_field: "{{slug}}"
        display_fields: ["title", "year"]
        required: false
      - label: "Cover image (filename in src/assets/businesses/)"
        name: "image"
        widget: "string"
        required: false
      - { label: "Latitude (optional)", name: "lat", widget: "number", value_type: "float", step: 0.0001, required: false }
      - { label: "Longitude (optional)", name: "lng", widget: "number", value_type: "float", step: 0.0001, required: false }
      - <<: *topics_field
      - { label: "Status", name: "status", widget: "select", options: ["current", "past"], default: "current" }
      - { label: "Closed year (if past)", name: "closedYear", widget: "number", required: false }
      - { label: "Record created (optional)", name: "dateCreated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Record updated (optional)", name: "dateUpdated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "development"
    label: "Development Watch"
    folder: "src/content/development"
    create: true
    summary: "{{title}}  ·  {{dateUpdated | date('YYYY-MM-DD')}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["current", "past"], default: "current" }
      - { label: "Phase", name: "phase", widget: "select", options: ["proposed","under-review","approved","under-construction","complete","denied"] }
      - { label: "Address", name: "address", widget: "string" }
      - { label: "Developer (optional)", name: "developer", widget: "string", required: false }
      - { label: "Submitted to city (optional)", name: "submittedDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Record created (optional)", name: "dateCreated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Last updated (project status)", name: "dateUpdated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "City planning URL (optional)", name: "cityPlanningUrl", widget: "string", required: false }
      - { label: "Latitude (optional)", name: "lat", widget: "number", value_type: "float", step: 0.0001, required: false }
      - { label: "Longitude (optional)", name: "lng", widget: "number", value_type: "float", step: 0.0001, required: false }
      - <<: *topics_field
      - label: "Related news"
        name: "newsSlugs"
        widget: "relation"
        collection: "news"
        search_fields: ["title", "date"]
        value_field: "{{slug}}"
        display_fields: ["title", "date"]
        multiple: true
        required: false
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "history"
    label: "History"
    folder: "src/content/history"
    create: true
    summary: "{{title}}  ·  {{year}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Year", name: "year", widget: "number" }
      - { label: "Decade", name: "decade", widget: "number" }
      - { label: "Category", name: "category", widget: "select", options: ["founding","development","community","landmark","other"] }
      - <<: *topics_field
      - label: "Related place"
        name: "placeSlug"
        widget: "relation"
        collection: "places"
        search_fields: ["name"]
        value_field: "{{slug}}"
        display_fields: ["name", "placeType"]
        required: false
      - { label: "Record created (optional)", name: "dateCreated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Record updated (optional)", name: "dateUpdated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "objectives"
    label: "Objectives"
    folder: "src/content/objectives"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Status", name: "status", widget: "select", options: ["current", "past"], default: "current" }
      - { label: "Order", name: "order", widget: "number", default: 99 }
      - { label: "Contact Email", name: "contactEmail", widget: "string", required: false }
      - <<: *topics_field
      - { label: "Record created (optional)", name: "dateCreated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Record updated (optional)", name: "dateUpdated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "meetings"
    label: "NENA Meetings"
    folder: "src/content/meetings"
    create: true
    summary: "{{title}}  ·  {{meetingDate | date('YYYY-MM-DD')}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Meeting date", name: "meetingDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Season", name: "season", widget: "select", options: ["spring", "fall", "annual", "other"], required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Minutes PDF (path under public/)", name: "minutesPdf", widget: "string", required: false }
      - { label: "Minutes DOCX (path under public/)", name: "minutesDocx", widget: "string", required: false }
      - { label: "Legacy URL (optional)", name: "legacyUrl", widget: "string", required: false }
      - <<: *topics_field
      - label: "Related event"
        name: "eventSlug"
        widget: "relation"
        collection: "events"
        search_fields: ["title", "startDate"]
        value_field: "{{slug}}"
        display_fields: ["title", "startDate"]
        required: false
      - label: "Related news"
        name: "newsSlugs"
        widget: "relation"
        collection: "news"
        search_fields: ["title", "date"]
        value_field: "{{slug}}"
        display_fields: ["title", "date"]
        multiple: true
        required: false
      - { label: "Record created (optional)", name: "dateCreated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Record updated (optional)", name: "dateUpdated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
