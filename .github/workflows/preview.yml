name: Deploy Preview
on:
  push:
    branches-ignore:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    # Surfaces the preview URL in the PR sidebar / Deployments UI in addition to the sticky comment.
    # Named to mirror `github-pages` used by the production Pages deploy workflow.
    environment:
      name: cloudflare-preview
      url: ${{ steps.wrangler.outputs.deployment-url }}
    env:
      PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Root-hosted Worker build (must match deploy:cf / wrangler — default `pnpm run build` uses GitHub Pages base path).
      - run: pnpm run build:cf
      # Worker + assets project: use Wrangler, not Pages API (no Pages project exists for this app).
      # `versions upload` publishes a preview URL without replacing production traffic.
      # Note: intentionally no `gitHubToken` here — wrangler-action would otherwise post a fresh
      # PR comment on every push. We post/update a single sticky comment ourselves below.
      - name: Upload Worker preview version
        id: wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload
          packageManager: pnpm

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.wrangler.outputs.deployment-url != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          # `header` keys the comment so subsequent runs update it instead of adding a new one.
          header: preview-deployment
          message: |
            ### Preview deployment

            **URL:** ${{ steps.wrangler.outputs.deployment-url }}

            Updated for commit `${{ github.event.pull_request.head.sha }}`.
