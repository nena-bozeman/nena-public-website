name: Deploy Preview
on:
  push:
    branches-ignore:
      - main
  pull_request:
jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Root-hosted Worker build (must match deploy:cf / wrangler — default `pnpm run build` uses GitHub Pages base path).
      - run: pnpm run build:cf
      # Worker + assets project: use Wrangler, not Pages API (no Pages project exists for this app).
      # `versions upload` publishes a preview URL without replacing production traffic.
      - name: Upload Worker preview version
        id: wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload
          packageManager: pnpm
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
