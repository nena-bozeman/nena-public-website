name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  astro-check:
    name: Astro check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run check

  build-and-check-internal-links:
    needs: astro-check
    runs-on: ubuntu-latest
    steps:
      - run: npm run build
      - run: npm run check:internal-links
